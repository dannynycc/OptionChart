<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇權籌碼面板</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.css">
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15/dist/nouislider.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── 頂部工具列 ── -->
<header id="toolbar">
  <div class="toolbar-item">
    <span class="label">合約選擇</span>
    <select id="contract-select"><option value="">載入中...</option></select>
  </div>
  <div class="toolbar-item">
    <span class="label">結算日</span>
    <span id="settlement-date">--</span>
  </div>
  <div class="toolbar-item">
    <span class="label">資料時間</span>
    <span id="last-updated">--</span>
  </div>
  <div class="toolbar-item">
    <button id="btn-full-session" class="toggle-btn active">全日盤(夜+日)</button>
    <button id="btn-day-session"  class="toggle-btn">日盤(一般)</button>
  </div>
  <div class="toolbar-item">
    <span class="label">損益視圖</span>
    <select id="view-mode-select">
      <option value="live">即時 (當盤)</option>
      <option value="weekly">即時 (當週全日盤累積)</option>
    </select>
  </div>
  <div class="toolbar-item">
    <span class="label">期交所代號</span>
    <span id="series-code">--</span>
  </div>
  <!-- 狀態列移到工具列右側 -->
  <div id="status-bar">
    <span id="conn-dot" class="dot dot-gray"></span>
    <span id="conn-label">連線中...</span>
    &nbsp;｜&nbsp;
    <span id="sub-count">--</span> 個履約價
  </div>
</header>

<!-- ── 主體 ── -->
<main id="main-body">

  <!-- 左側：T字報價表 -->
  <section id="left-panel">
    <div id="table-scroll">
      <div id="table-header">
        <div class="col-call-sell">外盤成交量<br>(Buy Call)</div>
        <div class="col-call-buy">內盤成交量<br>(Sell Call)</div>
        <div class="col-call-vol">成交量</div>
        <div class="col-call-ratio">內外盤<br>(%)</div>
        <div class="col-call-avg">均價</div>
        <div class="col-call-bid">委買</div>
        <div class="col-call-ask">委賣</div>
        <div class="col-call-last">成交價</div>
        <div class="col-call-val">淨CALL</div>
        <div class="col-call-bar"></div>
        <div class="col-strike">履約價</div>
        <div class="col-put-bar"></div>
        <div class="col-put-val">淨PUT</div>
        <div class="col-put-bid">委買</div>
        <div class="col-put-ask">委賣</div>
        <div class="col-put-last">成交價</div>
        <div class="col-put-buy">內盤成交量<br>(Sell Put)</div>
        <div class="col-put-sell">外盤成交量<br>(Buy Put)</div>
        <div class="col-put-vol">成交量</div>
        <div class="col-put-ratio">內外盤<br>(%)</div>
        <div class="col-put-avg">均價</div>
        <div class="col-synthetic">合成期貨<br>(F_K)</div>
        <div class="col-pnl-call">Call損益<br>(億)</div>
        <div class="col-pnl-put">Put損益<br>(億)</div>
        <div class="col-pnl-combined">合併損益<br>(億)</div>
      </div>
      <div id="strike-table-body">
        <!-- 由 app.js 動態填入 -->
      </div>
    </div>
  </section>

  <!-- 左右拖拉分隔線 -->
  <div id="resize-handle"></div>

  <!-- 右側：損益曲線圖 -->
  <section id="right-panel">
    <div id="pnl-stats"></div>
    <div id="pnl-chart"></div>
    <div id="range-slider-wrap">
      <div id="range-slider"></div>
    </div>
  </section>

</main>

<!-- ── 資料饋送中斷 Toast ── -->
<div id="feed-dead-toast">
  <button class="toast-close" onclick="document.getElementById('feed-dead-toast')._manualDismiss=true;this.parentElement.classList.remove('visible')">✕</button>
  <div class="toast-title">⚠ 資料饋送中斷</div>
  <div class="toast-body" id="feed-dead-msg">xqfap 已停止推送資料</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
